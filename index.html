<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Priel Musical</title>
    <style>
        :root { --accent: #ffc107; }
        body { display: flex; height: 100vh; margin: 0; font-family: system-ui, sans-serif; background: #fff; }
        
        .sidebar { width: 260px; background: #f8f9fa; padding: 20px; border-right: 1px solid #e9ecef; display: flex; flex-direction: column; }
        .app-title { font-size: 18px; font-weight: bold; margin-bottom: 25px; color: #000; }
        
        .project-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        .project-item { padding: 12px; background: #eee; border-radius: 6px; cursor: pointer; transition: 0.2s; }
        .project-item.active { background: var(--accent); font-weight: bold; }
        
        .main { flex: 1; padding: 30px; overflow-y: auto; display: flex; flex-direction: column; }
        
        .song-header { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        .song-title { font-size: 2rem; font-weight: bold; margin: 0; }
        .song-meta { display: flex; gap: 15px; }
        .meta-input, .meta-select { padding: 5px; border: 1px solid #ccc; border-radius: 4px; background: white; }
        
        .tabs { display: flex; gap: 20px; border-bottom: 1px solid #ddd; margin-bottom: 20px; }
        .tab { padding: 10px 0; cursor: pointer; color: #666; border-bottom: 3px solid transparent; }
        .tab.active { border-color: var(--accent); color: #000; font-weight: bold; }

        .toolbar { display: flex; gap: 10px; margin-bottom: 15px; align-items: center; background: #f8f9fa; padding: 10px; border-radius: 5px; border: 1px solid #eee; }
        .btn { padding: 8px 15px; border: 1px solid #ccc; border-radius: 5px; cursor: pointer; background: white; font-weight: 500; }
        
        /* Pizarra */
        .pizarra-container { display: none; flex: 1; flex-direction: column; }
        .pizarra-container.active { display: flex; }
        .editor { flex: 1; border: 1px solid #ccc; border-radius: 5px; padding: 15px; min-height: 300px; outline: none; }
        
        /* Score */
        .score-container { display: none; flex-direction: column; }
        .score-container.active { display: flex; }
        
        .section-container { margin-bottom: 35px; padding: 15px; border-radius: 10px; border: 1px solid #eee; }
        .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px; }
        .section-header-left { display: flex; align-items: center; gap: 15px; }
        .palette { display: flex; gap: 5px; }
        .color-dot { width: 20px; height: 20px; border-radius: 50%; cursor: pointer; border: 1px solid rgba(0,0,0,0.1); }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 12px; }
        .measure { border: 2px solid #ddd; border-radius: 8px; height: 70px; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; font-weight: bold; background: #fff; position: relative; }
        .measure input { width: 85%; border: none; border-bottom: 2px solid var(--accent); outline: none; text-align: center; font-size: 1rem; }
        .save-btn { position: absolute; right: 2px; bottom: 2px; font-size: 10px; cursor: pointer; background: #4caf50; color: white; border: none; border-radius: 3px; padding: 2px 5px; }
        .del-btn { position: absolute; left: 2px; bottom: 2px; font-size: 10px; cursor: pointer; background: none; border: none; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="app-title">🎵 Priel Musical</div>
        <div class="project-list" id="project-list"></div>
        <button class="btn" onclick="addProject()" style="margin-top: 15px; background: var(--accent); border:none;">+ Nueva Canción</button>
    </div>

    <div class="main" id="main-content" style="display: none;">
        <div class="song-header">
            <h1 class="song-title" id="project-name"></h1>
            <div class="song-meta">
                <input type="text" id="meta-singer" class="meta-input" placeholder="Cantante" onchange="updateMeta('singer', this.value)">
                <select id="meta-key" class="meta-select" onchange="updateMeta('key', this.value)">
                    <option value="">Tonalidad</option>
                    </select>
                <input type="text" id="meta-time" class="meta-input" placeholder="Compás (ej. 4/4)" onchange="updateMeta('time', this.value)">
            </div>
        </div>

        <div class="tabs">
            <div class="tab" id="tab-pizarra" onclick="setTab('pizarra')">Pizarra</div>
            <div class="tab" id="tab-score" onclick="setTab('score')">Score</div>
        </div>

        <div class="pizarra-container" id="pizarra-view">
            <div class="toolbar">
                <select onchange="formatDoc('fontSize', this.value)">
                    <option value="3">Normal</option>
                    <option value="5">Grande</option>
                    <option value="7">Extra</option>
                </select>
                <input type="color" onchange="formatDoc('foreColor', this.value)">
                <button class="btn" onclick="formatDoc('bold')">B</button>
                <button class="btn" onclick="formatDoc('italic')">I</button>
            </div>
            <div class="editor" id="rich-editor" contenteditable="true" onblur="savePizarra()"></div>
        </div>

        <div class="score-container" id="score-view">
            <div class="toolbar">
                <button class="btn" onclick="addSection()" style="background:var(--accent); border:none;">+ Sección</button>
                <div style="flex: 1;"></div>
                <span style="font-weight:bold; font-size:0.9em;">Transpose:</span>
                <button class="btn" onclick="transpose(-1)">-1</button>
                <button class="btn" onclick="transpose(1)">+1</button>
                <button class="btn" onclick="resetTranspose()">Reset</button>
                <span id="transpose-badge" style="font-weight:bold; color:var(--accent); min-width:20px; text-align:center;">0</span>
            </div>
            <div id="sections-content"></div>
        </div>
    </div>

    <script>
        const colors = ['#f8f9fa', '#ffcccc', '#ccffcc', '#ccccff', '#ffffcc', '#ffccff', '#ccffff'];
        const notes = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
        const flatToSharp = { 'Db':'C#', 'Eb':'D#', 'Gb':'F#', 'Ab':'G#', 'Bb':'A#' };

        let projects = [];
        let activeId = null;
        let activeTab = 'score';

        function init() {
            const keySelect = document.getElementById('meta-key');
            notes.forEach(n => {
                keySelect.innerHTML += `<option value="${n}">${n}</option>`;
                keySelect.innerHTML += `<option value="${n}m">${n}m</option>`;
            });
            addProject("Demo");
        }

        function render() {
            const list = document.getElementById('project-list');
            list.innerHTML = projects.map(p => `
                <div class="project-item ${p.id === activeId ? 'active' : ''}" onclick="selectProject(${p.id})">
                    ${p.name}
                </div>
            `).join('');

            const project = getProj();
            if (!project) return;

            document.getElementById('main-content').style.display = 'flex';
            document.getElementById('project-name').textContent = project.name;
            document.getElementById('meta-singer').value = project.meta.singer;
            document.getElementById('meta-key').value = project.meta.key;
            document.getElementById('meta-time').value = project.meta.time;
            document.getElementById('transpose-badge').textContent = project.transposeOffset;

            document.getElementById('tab-pizarra').className = `tab ${activeTab === 'pizarra' ? 'active' : ''}`;
            document.getElementById('tab-score').className = `tab ${activeTab === 'score' ? 'active' : ''}`;
            document.getElementById('pizarra-view').className = `pizarra-container ${activeTab === 'pizarra' ? 'active' : ''}`;
            document.getElementById('score-view').className = `score-container ${activeTab === 'score' ? 'active' : ''}`;

            if (activeTab === 'pizarra') {
                const editor = document.getElementById('rich-editor');
                if (editor.innerHTML !== project.pizarra) editor.innerHTML = project.pizarra;
            } else {
                const container = document.getElementById('sections-content');
                container.innerHTML = project.sections.map(s => `
                    <div class="section-container" style="background:${s.color}30; border-left:5px solid ${s.color === '#f8f9fa' ? '#ccc' : s.color}">
                        <div class="section-header">
                            <div class="section-header-left">
                                <div class="palette">
                                    ${colors.map(c => `<div class="color-dot" style="background:${c}" onclick="updateColor('${s.id}', '${c}')"></div>`).join('')}
                                </div>
                                <span style="font-weight:bold">${s.name}</span>
                            </div>
                            <div>
                                <button class="btn" style="padding:2px 8px" onclick="duplicateSection('${s.id}')">📋</button>
                                <button class="btn" style="padding:2px 8px" onclick="deleteSection('${s.id}')">🗑️</button>
                            </div>
                        </div>
                        <div class="grid">
                            ${s.measures.map((m, idx) => `
                                <div class="measure">
                                    ${m.editing ? 
                                        `<input type="text" id="in-${s.id}-${idx}" value="${m.originalVal}" onkeydown="handleKey(event, '${s.id}', ${idx})">
                                         <button class="save-btn" onclick="saveMeasure('${s.id}', ${idx})">✓</button>
                                         <button class="del-btn" onclick="deleteMeasure('${s.id}', ${idx})">🗑️</button>` : 
                                        `<span style="width:100%; text-align:center; cursor:pointer" onclick="editMeasure('${s.id}', ${idx})">
                                            ${processTransposition(m.originalVal, project.transposeOffset)}
                                         </span>`
                                    }
                                </div>
                            `).join('')}
                            <div class="measure" style="border-style:dashed; cursor:pointer" onclick="addMeasure('${s.id}')">+</div>
                        </div>
                    </div>
                `).join('');
            }
        }

        // --- Lógica de Transposición mejorada ---
        function processTransposition(input, offset) {
            if (!input || input === '%' || offset === 0) return input;
            // Divide la entrada por espacios para procesar múltiples acordes
            return input.split(' ').map(chord => transposeChord(chord, offset)).join(' ');
        }

        function transposeChord(chord, offset) {
            const match = chord.match(/^([CDEFGAB][#b]?)(.*)$/i);
            if (!match) return chord;

            let root = match[1].charAt(0).toUpperCase() + match[1].slice(1).replace('b', (m) => {
                // Conversión simple de bemol a sostenido para el índice
                return ''; // Manejado abajo con flatToSharp
            });
            
            // Normalizar nota
            if (match[1].length > 1 && match[1].endsWith('b')) {
                root = flatToSharp[match[1].charAt(0).toUpperCase() + 'b'] || root;
            }

            let idx = notes.indexOf(root);
            if (idx === -1) return chord;

            let newIdx = (idx + offset) % 12;
            if (newIdx < 0) newIdx += 12;

            return notes[newIdx] + match[2];
        }

        // --- Funciones de Interfaz ---
        function transpose(steps) { getProj().transposeOffset += steps; render(); }
        function resetTranspose() { getProj().transposeOffset = 0; render(); }
        function setTab(tab) { activeTab = tab; render(); }
        function selectProject(id) { activeId = id; render(); }
        
        function addProject(name = null) {
            const n = name || prompt("Nombre de la canción:");
            if (n) {
                projects.push({ id: Date.now(), name: n, meta: { singer: '', key: '', time: '' }, pizarra: '', sections: [], transposeOffset: 0 });
                activeId = projects[projects.length - 1].id;
                render();
            }
        }

        function updateMeta(field, val) { getProj().meta[field] = val; }
        function savePizarra() { getProj().pizarra = document.getElementById('rich-editor').innerHTML; }
        function formatDoc(cmd, val = null) { document.execCommand(cmd, false, val); }

        function addSection() {
            const name = prompt("Nombre (Intro, Verso...):");
            if (name) { getProj().sections.push({ id: 's'+Date.now(), name, color: '#f8f9fa', measures: [] }); render(); }
        }
        function duplicateSection(id) {
            const s = getSection(id);
            getProj().sections.push({...s, id: 's'+Date.now(), measures: JSON.parse(JSON.stringify(s.measures))});
            render();
        }
        function deleteSection(id) { if(confirm("¿Borrar sección?")) { getProj().sections = getProj().sections.filter(x => x.id !== id); render(); } }
        function updateColor(sid, c) { getSection(sid).color = c; render(); }

        function addMeasure(sid) { getSection(sid).measures.push({ originalVal: '', editing: true }); render(); }
        function editMeasure(sid, idx) { getSection(sid).measures[idx].editing = true; render(); }
        function saveMeasure(sid, idx) { 
            const val = document.getElementById(`in-${sid}-${idx}`).value;
            getSection(sid).measures[idx] = { originalVal: val || '%', editing: false };
            render();
        }
        function deleteMeasure(sid, idx) { getSection(sid).measures.splice(idx, 1); render(); }
        function handleKey(e, sid, idx) { if (e.key === 'Enter') saveMeasure(sid, idx); }

        function getProj() { return projects.find(p => p.id === activeId); }
        function getSection(id) { return getProj().sections.find(s => s.id === id); }

        init();
    </script>
</body>
</html>
