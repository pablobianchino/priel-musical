<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Priel Musical</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --accent: #ffc107; --border-radius: 20px; }
        body { display: flex; height: 100vh; margin: 0; font-family: system-ui, sans-serif; background: #fff; color: #333; }
        
        /* Sidebar */
        .sidebar { width: 260px; background: #f8f9fa; padding: 20px; border-right: 1px solid #e9ecef; display: flex; flex-direction: column; gap: 15px; position: relative; }
        .app-title { font-size: 20px; font-weight: bold; color: #000; display: flex; align-items: center; gap: 10px; margin-bottom: 5px; }
        .search-box { width: 100%; padding: 8px 12px; border: 1px solid #ddd; border-radius: 20px; outline: none; box-sizing: border-box; font-size: 0.9rem; background: white; }
        .sidebar-header { font-size: 0.8rem; color: #666; font-weight: bold; display: flex; align-items: center; gap: 5px; margin-top: 5px; }
        .project-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 2px; }
        .project-item { padding: 10px 15px; background: transparent; border-radius: 10px; cursor: pointer; transition: 0.2s; font-size: 0.95rem; display: flex; align-items: center; justify-content: space-between; }
        .project-item:hover { background: #e9ecef; }
        .project-item.active { background: var(--accent); font-weight: bold; color: #000; }
        .project-item .del-btn { display: none; background: none; border: none; cursor: pointer; font-size: 1.1rem; }
        .project-item:hover .del-btn { display: block; }
        .add-project-link { padding: 10px 15px; cursor: pointer; color: #555; display: flex; align-items: center; gap: 8px; font-size: 0.95rem; margin-top: auto; }
        .add-project-link:hover { color: #000; font-weight: 500; }

        /* Main Content */
        .main { flex: 1; padding: 30px; overflow-y: auto; display: flex; flex-direction: column; position: relative; }
        .song-header { display: flex; flex-direction: column; gap: 15px; margin-bottom: 20px; }
        .song-title-row { display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .song-title { font-size: 1.8rem; font-weight: bold; margin: 0; outline: none; border-bottom: 2px solid transparent; }
        .song-title[contenteditable="true"]:focus { border-color: var(--accent); }
        .top-toolbar { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        .btn-pill { padding: 6px 16px; border: 1px solid #ccc; border-radius: var(--border-radius); background: white; cursor: pointer; font-size: 0.9rem; display: flex; align-items: center; gap: 5px; outline: none; }
        .btn-pill:hover { background: #f0f0f0; }
        .song-meta { display: flex; gap: 15px; margin-top: 5px; }
        .meta-input, .meta-select { padding: 6px 12px; border: 1px solid #ccc; border-radius: 10px; background: white; outline: none; }

        /* Tabs */
        .tabs { display: flex; gap: 20px; border-bottom: 1px solid #ddd; margin-bottom: 20px; }
        .tab { padding: 10px 0; cursor: pointer; color: #666; border-bottom: 3px solid transparent; }
        .tab.active { border-color: var(--accent); color: #000; font-weight: bold; }

        /* Views */
        .pizarra-container, .score-container { display: none; flex-direction: column; flex: 1; }
        .pizarra-container.active, .score-container.active { display: flex; }
        .editor { flex: 1; border: 1px solid #ccc; border-radius: 10px; padding: 15px; min-height: 300px; outline: none; }

        /* Score Sections */
        .section-container { margin-bottom: 35px; border-radius: 15px; border: 1px solid #eee; background: transparent; }
        .section-container.collapsed { margin-bottom: 15px; border: none; }
        .section-header { display: flex; align-items: center; justify-content: space-between; padding: 15px 15px 0 15px; margin-bottom: 15px; }
        .section-header-left { display: flex; align-items: center; gap: 10px; position: relative; }
        .collapse-icon { cursor: pointer; color: #999; font-size: 1.2rem; width: 15px; text-align: center; }
        .dot-wrapper { position: relative; display: inline-block; height: 18px; }
        .color-dot { width: 18px; height: 18px; border-radius: 50%; border: 1px solid rgba(0,0,0,0.1); cursor: pointer; }
        .section-controls-panel { display: none; position: absolute; background: #fff; min-width: 220px; box-shadow: 0 8px 16px rgba(0,0,0,0.1); z-index: 10; border-radius: 10px; border: 1px solid #eee; padding: 15px; flex-direction: column; gap: 10px; top: 100%; left: 0; }
        .dot-wrapper:hover .section-controls-panel { display: flex; }

        /* 4-Measure Grid */
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; padding: 0 15px 15px 15px; }
        .measure { border: 2px solid #ddd; border-radius: 10px; height: 70px; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; font-weight: bold; background: #fff; position: relative; }
        .measure input { width: 90%; border: none; border-bottom: 2px solid var(--accent); outline: none; text-align: center; font-size: 1rem; }
        .edit-controls { position: absolute; bottom: 2px; left: 2px; display: flex; gap: 5px; }
        .save-btn { background: #4caf50; color: white; font-size: 10px; border: none; border-radius: 3px; padding: 2px 5px; cursor: pointer; }
        .del-measure-btn { background: none; border: none; cursor: pointer; font-size: 10px; }
        .check-pill { display: flex; align-items: center; gap: 3px; padding: 2px 6px; border-radius: 8px; cursor: pointer; font-size: 0.75rem; border: 1px solid #ddd; }
        .check-pill.active { background: var(--accent); border-color: var(--accent); font-weight: bold; }
        .symbol { font-family: monospace; font-size: 1.2rem; color: #555; width: 25px; text-align: center; }

        /* Modal */
        #presentation-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #f4f4f4; z-index: 1000; overflow-y: auto; padding: 40px; }
        .presentation-content { max-width: 800px; margin: 0 auto; background: white; padding: 40px; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="app-title">🎵 Priel Musical</div>
        <input type="text" id="search-input" class="search-box" placeholder="🔍 Buscar canciones..." onkeyup="filterProjects()">
        <div class="sidebar-header">⌄ CANCIONES</div>
        <div class="project-list" id="project-list"></div>
        <div class="add-project-link" onclick="addProject()"><span>⊕</span> Canción nueva</div>
    </div>

    <div class="main" id="main-content" style="display: none;">
        <div class="song-header">
            <div class="song-title-row">
                <h1 class="song-title" id="project-name" contenteditable="true" onblur="saveProjectName(this)" onkeypress="if(event.key==='Enter'){this.blur(); event.preventDefault();}"></h1>
                <span style="color: #ccc;">✓</span>
            </div>
            <div class="top-toolbar">
                <button class="btn-pill" onclick="transpose(-1)">↘ -½</button>
                <button class="btn-pill" onclick="transpose(1)">↗ +½</button>
                <button class="btn-pill" onclick="resetTranspose()">🔄</button>
                <span id="transpose-badge" style="font-weight:bold; color:var(--accent); min-width:20px; text-align:center;">0</span>
                <button class="btn-pill" onclick="openPresentation()">↗ Presentación</button>
                <button class="btn-pill" onclick="downloadPDF()">📥 PDF</button>
            </div>
            <div class="song-meta">
                <input type="text" id="meta-singer" class="meta-input" placeholder="Cantante" onchange="updateMeta('singer', this.value)">
                <select id="meta-key" class="meta-select" onchange="updateMeta('key', this.value)"></select>
                <select id="meta-time" class="meta-select" onchange="updateMeta('time', this.value)">
                    <option value="">Compás</option>
                    <option value="4/4">4/4</option><option value="3/4">3/4</option><option value="2/4">2/4</option>
                    <option value="6/8">6/8</option><option value="12/8">12/8</option><option value="5/4">5/4</option>
                </select>
            </div>
        </div>
        <div class="tabs">
            <div class="tab" id="tab-pizarra" onclick="setTab('pizarra')">Pizarra</div>
            <div class="tab" id="tab-score" onclick="setTab('score')">Score</div>
        </div>
        <div class="pizarra-container" id="pizarra-view">
            <div class="editor" id="rich-editor" contenteditable="true" onblur="savePizarra()"></div>
        </div>
        <div class="score-container" id="score-view">
            <div class="score-actions"><button class="btn-pill" onclick="addSection()" style="background:var(--accent); border:none;">+ Sección</button></div>
            <div id="sections-content"></div>
        </div>
    </div>

    <div id="presentation-modal">
        <button class="btn-pill" onclick="document.getElementById('presentation-modal').style.display='none'">Cerrar</button>
        <div class="presentation-content" id="print-area"></div>
    </div>

    <script>
        const colors = ['#f8f9fa', '#ffebee', '#e8f5e9', '#e3f2fd', '#fffde7', '#f3e5f5', '#e0f7fa', '#ffe0b2'];
        const notes = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
        const flatToSharp = { 'Db':'C#', 'Eb':'D#', 'Gb':'F#', 'Ab':'G#', 'Bb':'A#' };
        let projects = [], activeId = null, activeTab = 'score';

        async function init() {
            const ks = document.getElementById('meta-key');
            notes.forEach(n => { ks.innerHTML += `<option value="${n}">${n}</option><option value="${n}m">${n}m</option>`; });
            await loadProjects();
        }

        async function loadProjects() {
            try {
                const res = await fetch('/api/projects');
                const data = await res.json();
                if (data) { projects = data; activeId = projects[0].id; }
            } catch (e) { console.log("Usando memoria local..."); }
            render();
        }

        async function saveState() {
            render();
            try {
                await fetch('/api/projects', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ projects }) });
            } catch (e) {}
        }

        function render() {
            const list = document.getElementById('project-list');
            list.innerHTML = projects.map(p => `
                <div class="project-item ${p.id === activeId ? 'active' : ''}" onclick="activeId=${p.id};render();">
                    <span>${p.name}</span>
                    <button class="del-btn" onclick="event.stopPropagation();if(confirm('¿Eliminar?')){projects=projects.filter(x=>x.id!==${p.id});saveState();}">🗑️</button>
                </div>`).join('');

            const p = projects.find(x => x.id === activeId);
            if (!p) return document.getElementById('main-content').style.display = 'none';
            document.getElementById('main-content').style.display = 'flex';
            document.getElementById('project-name').textContent = p.name;
            document.getElementById('meta-singer').value = p.meta.singer || '';
            document.getElementById('meta-key').value = p.meta.key || '';
            document.getElementById('meta-time').value = p.meta.time || '';
            document.getElementById('transpose-badge').textContent = p.transposeOffset || 0;
            
            document.getElementById('tab-pizarra').className = `tab ${activeTab === 'pizarra' ? 'active' : ''}`;
            document.getElementById('tab-score').className = `tab ${activeTab === 'score' ? 'active' : ''}`;
            document.getElementById('pizarra-view').className = `pizarra-container ${activeTab === 'pizarra' ? 'active' : ''}`;
            document.getElementById('score-view').className = `score-container ${activeTab === 'score' ? 'active' : ''}`;

            if (activeTab === 'pizarra') document.getElementById('rich-editor').innerHTML = p.pizarra || '';
            else {
                document.getElementById('sections-content').innerHTML = p.sections.map(s => `
                    <div class="section-container ${s.collapsed ? 'collapsed' : ''}" style="${s.collapsed ? '' : `border-left:5px solid ${s.color}`}">
                        <div class="section-header">
                            <div class="section-header-left">
                                <span class="collapse-icon" onclick="const p=projects.find(x=>x.id===${activeId}); const sec=p.sections.find(x=>x.id==='${s.id}'); sec.collapsed=!sec.collapsed; saveState();">${s.collapsed ? '›' : '⌄'}</span>
                                <div class="dot-wrapper">
                                    <div class="color-dot" style="background:${s.color}"></div>
                                    <div class="section-controls-panel">
                                        <div class="palette">${colors.map(c => `<div class="color-dot" style="background:${c}" onclick="const p=projects.find(x=>x.id===${activeId}); p.sections.find(x=>x.id==='${s.id}').color='${c}'; saveState();"></div>`).join('')}</div>
                                        <div style="display:flex; justify-content:space-between;">
                                            <button class="btn-pill" onclick="const p=projects.find(x=>x.id===${activeId}); p.sections.find(x=>x.id==='${s.id}').repeat_count++; saveState();">+ Repetir</button>
                                            <button class="btn-pill" onclick="if(confirm('¿Eliminar?')){const p=projects.find(x=>x.id===${activeId}); p.sections=p.sections.filter(x=>x.id!=='${s.id}'); saveState();}">🗑️</button>
                                        </div>
                                    </div>
                                </div>
                                <span style="font-weight:bold">${s.name}</span> <span style="color:#888; font-size:0.9em;">${s.repeat_count > 1 ? 'x'+s.repeat_count : ''}</span>
                            </div>
                            <div>
                                <button class="btn-pill" onclick="moveSec('${s.id}',-1)">↑</button><button class="btn-pill" onclick="moveSec('${s.id}',1)">↓</button>
                            </div>
                        </div>
                        <div class="grid" style="${s.collapsed ? 'display:none' : ''}">
                            ${s.measures.map((m, idx) => {
                                let val = m.editing ? m.originalVal : trans(m.originalVal, p.transposeOffset);
                                return `<div class="measure">
                                    ${m.editing ? `<input id="in-${s.id}-${idx}" value="${val}" onkeydown="if(event.key==='Enter')saveMea('${s.id}',${idx})">
                                        <div class="edit-controls">
                                            <label class="check-pill ${val.includes('||:')?'active':''}"><input type="checkbox" onchange="togSym('${s.id}',${idx},'start')">||:</label>
                                            <label class="check-pill ${val.includes(':||')?'active':''}"><input type="checkbox" onchange="togSym('${s.id}',${idx},'end')">:||</label>
                                            <button class="save-btn" onclick="saveMea('${s.id}',${idx})">✓</button>
                                        </div>` : `<span style="width:100%;text-align:center;cursor:pointer;display:flex;justify-content:space-between;padding:0 10px" onclick="const p=projects.find(x=>x.id===${activeId}); p.sections.find(x=>x.id==='${s.id}').measures[${idx}].editing=true;render();">
                                            <span>${val.includes('||:')?'||:':''}</span><span>${val.replace('||:','').replace(':||','').trim()}</span><span>${val.includes(':||')?':||':''}</span>
                                        </span>`}
                                </div>`
                            }).join('')}
                            <div class="measure" style="border-style:dashed;cursor:pointer" onclick="const p=projects.find(x=>x.id===${activeId}); p.sections.find(x=>x.id==='${s.id}').measures.push({originalVal:'',editing:true});render();">+</div>
                        </div>
                    </div>`).join('');
            }
        }

        function trans(input, offset) {
            if (!input || input === '%' || !offset) return input;
            return input.split(' ').map(c => {
                const m = c.match(/^(\|\|:\s*)?([CDEFGAB][#b]?)(.*?)(\s*:\|\|)?$/i);
                if (!m) return c;
                let root = m[2].charAt(0).toUpperCase() + m[2].slice(1).replace('b', '');
                if (m[2].endsWith('b')) root = flatToSharp[m[2].charAt(0).toUpperCase() + 'b'] || root;
                let idx = notes.indexOf(root);
                if (idx === -1) return c;
                let newIdx = (idx + offset) % 12; if (newIdx < 0) newIdx += 12;
                return (m[1]||'') + notes[newIdx] + m[3] + (m[4]||'');
            }).join(' ');
        }

        function moveSec(id, dir) {
            const p = projects.find(x => x.id === activeId);
            const idx = p.sections.findIndex(x => x.id === id);
            if (idx + dir >= 0 && idx + dir < p.sections.length) {
                [p.sections[idx], p.sections[idx + dir]] = [p.sections[idx + dir], p.sections[idx]];
                saveState();
            }
        }

        function togSym(sid, idx, type) {
            const input = document.getElementById(`in-${sid}-${idx}`);
            let val = input.value.trim();
            if (type === 'start') val = val.includes('||:') ? val.replace('||:', '').trim() : '||: ' + val;
            else val = val.includes(':||') ? val.replace(':||', '').trim() : val + ' :||';
            input.value = val;
        }

        function saveMea(sid, idx) {
            const p = projects.find(x => x.id === activeId);
            p.sections.find(x => x.id === sid).measures[idx] = { originalVal: document.getElementById(`in-${sid}-${idx}`).value.trim() || '%', editing: false };
            saveState();
        }

        // Utils
        function addProject() { const n = prompt("Nombre:"); if(n){ projects.push({id:Date.now(),name:n,meta:{},sections:[]}); activeId=projects[projects.length-1].id; saveState(); } }
        function addSection() { const n = prompt("Nombre:"); if(n){ projects.find(x=>x.id===activeId).sections.push({id:'s'+Date.now(),name:n,color:'#f8f9fa',repeat_count:1,measures:[]}); saveState(); } }
        function setTab(t) { activeTab = t; render(); }
        function transpose(n) { projects.find(x=>x.id===activeId).transposeOffset = (projects.find(x=>x.id===activeId).transposeOffset || 0) + n; saveState(); }
        function resetTranspose() { projects.find(x=>x.id===activeId).transposeOffset = 0; saveState(); }
        function updateMeta(k, v) { projects.find(x=>x.id===activeId).meta[k] = v; saveState(); }
        function savePizarra() { projects.find(x=>x.id===activeId).pizarra = document.getElementById('rich-editor').innerHTML; saveState(); }
        function openPresentation() { document.getElementById('print-area').innerHTML = "<h1>"+projects.find(x=>x.id===activeId).name+"</h1>"; document.getElementById('presentation-modal').style.display='block'; }
        init();
    </script>
</body>
</html>
