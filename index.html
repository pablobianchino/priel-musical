<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Priel Musical</title>
    <style>
        :root { --accent: #ffc107; }
        body { display: flex; height: 100vh; margin: 0; font-family: system-ui, sans-serif; background: #fff; }
        
        .sidebar { width: 260px; background: #f8f9fa; padding: 20px; border-right: 1px solid #e9ecef; display: flex; flex-direction: column; }
        .app-title { font-size: 18px; font-weight: bold; margin-bottom: 25px; color: #000; }
        
        .project-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        .project-item { padding: 12px; background: #eee; border-radius: 6px; cursor: pointer; transition: 0.2s; }
        .project-item.active { background: var(--accent); font-weight: bold; }
        
        .main { flex: 1; padding: 30px; overflow-y: auto; }
        .tabs { display: flex; gap: 20px; border-bottom: 1px solid #ddd; margin-bottom: 25px; }
        .tab { padding: 10px 0; cursor: pointer; color: #666; border-bottom: 3px solid transparent; }
        .tab.active { border-color: var(--accent); color: #000; font-weight: bold; }

        .section-container { margin-bottom: 35px; padding: 15px; border-radius: 10px; border: 1px solid #eee; }
        .section-header { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; }
        .section-title { font-weight: bold; font-size: 1.1rem; }
        .color-picker { border: none; width: 30px; height: 30px; cursor: pointer; background: none; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 12px; }
        
        .measure { 
            border: 2px solid #ddd; border-radius: 8px; height: 70px; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 1.2rem; font-weight: bold; background: #fff; position: relative;
        }
        .measure input { width: 80%; border: none; border-bottom: 2px solid var(--accent); outline: none; text-align: center; font-size: 1.1rem; }
        .save-btn { position: absolute; right: 5px; bottom: 5px; font-size: 12px; cursor: pointer; background: #4caf50; color: white; border: none; border-radius: 3px; }

        .btn { padding: 8px 15px; border: 1px solid #ccc; border-radius: 5px; cursor: pointer; background: white; font-weight: 500; }
        .btn-add { background: var(--accent); border: none; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="app-title">🎵 Priel Musical</div>
        <div class="project-list" id="project-list"></div>
        <button class="btn btn-add" onclick="addProject()" style="margin-top: 15px;">+ Nueva Canción</button>
    </div>

    <div class="main">
        <h1 id="project-name">Selecciona un proyecto</h1>
        <div class="tabs">
            <div class="tab">Pizarra</div>
            <div class="tab active">Score</div>
        </div>

        <button class="btn" onclick="addSection()" style="margin-bottom: 20px;">+ Sección</button>
        <div id="sections-content"></div>
    </div>

    <script>
        let projects = [{ id: 1, name: "Demo", sections: [] }];
        let activeId = 1;

        function render() {
            const list = document.getElementById('project-list');
            list.innerHTML = projects.map(p => `
                <div class="project-item ${p.id === activeId ? 'active' : ''}" onclick="selectProject(${p.id})">
                    ${p.name}
                </div>
            `).join('');

            const project = projects.find(p => p.id === activeId);
            if (!project) return;

            document.getElementById('project-name').textContent = project.name;
            const container = document.getElementById('sections-content');
            container.innerHTML = project.sections.map(s => `
                <div class="section-container" style="background-color: ${s.color}20; border-left: 5px solid ${s.color}">
                    <div class="section-header">
                        <input type="color" class="color-picker" value="${s.color}" onchange="updateColor(${s.id}, this.value)">
                        <span class="section-title">${s.name}</span>
                    </div>
                    <div class="grid">
                        ${s.measures.map((m, idx) => `
                            <div class="measure" id="m-${s.id}-${idx}">
                                ${m.editing ? 
                                    `<input type="text" id="in-${s.id}-${idx}" value="${m.val}" onkeypress="handleKey(event, ${s.id}, ${idx})">
                                     <button class="save-btn" onclick="saveMeasure(${s.id}, ${idx})">✓</button>` : 
                                    `<span onclick="editMeasure(${s.id}, ${idx})">${m.val || '...'}</span>`
                                }
                            </div>
                        `).join('')}
                        <div class="measure" style="border-style: dashed; cursor: pointer" onclick="addMeasure(${s.id})">+</div>
                    </div>
                </div>
            `).join('');
        }

        function addProject() {
            const name = prompt("Nombre de la canción:");
            if (name) {
                const newP = { id: Date.now(), name, sections: [] };
                projects.push(newP);
                activeId = newP.id;
                render();
            }
        }

        function selectProject(id) { activeId = id; render(); }

        function addSection() {
            const name = prompt("Nombre de sección (Intro, Verso...):");
            if (!name) return;
            const p = projects.find(p => p.id === activeId);
            p.sections.push({ id: Date.now(), name, color: '#f8f9fa', measures: [] });
            render();
        }

        function updateColor(secId, color) {
            const p = projects.find(p => p.id === activeId);
            const s = p.sections.find(s => s.id === secId);
            s.color = color;
            render();
        }

        function addMeasure(secId) {
            const p = projects.find(p => p.id === activeId);
            const s = p.sections.find(s => s.id === secId);
            s.measures.push({ val: '', editing: true });
            render();
            document.getElementById(`in-${secId}-${s.measures.length - 1}`).focus();
        }

        function editMeasure(secId, idx) {
            const p = projects.find(p => p.id === activeId);
            const s = p.sections.find(s => s.id === secId);
            s.measures[idx].editing = true;
            render();
        }

        function saveMeasure(secId, idx) {
            const val = document.getElementById(`in-${secId}-${idx}`).value;
            const p = projects.find(p => p.id === activeId);
            const s = p.sections.find(s => s.id === secId);
            s.measures[idx] = { val: val || '%', editing: false };
            render();
        }

        function handleKey(e, secId, idx) { if (e.key === 'Enter') saveMeasure(secId, idx); }

        render();
    </script>
</body>
</html>
