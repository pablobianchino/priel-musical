<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Priel Musical</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { display: flex; height: 100vh; margin: 0; font-family: system-ui, sans-serif; }
        
        .sidebar { width: 250px; background: #f8f9fa; padding: 20px; border-right: 1px solid #e9ecef; display: flex; flex-direction: column; }
        .app-title { font-size: 18px; font-weight: bold; margin-bottom: 30px; display: flex; align-items: center; gap: 10px; color: #000; }
        .sidebar h3 { font-size: 14px; color: #6c757d; margin-top: 0; }
        
        .project-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .project-item { padding: 10px; background: #e9ecef; border-radius: 6px; cursor: pointer; color: #333; }
        .project-item.active { background: #ffc107; font-weight: bold; color: #000; }
        
        .add-project-form { margin-top: 20px; display: flex; gap: 5px; }
        .input-text { flex: 1; padding: 8px; border: 1px solid #ced4da; border-radius: 4px; }
        
        .main { flex: 1; padding: 30px; background: #ffffff; overflow-y: auto; }
        
        .tabs { display: flex; gap: 20px; border-bottom: 1px solid #dee2e6; margin-bottom: 20px; }
        .tab { padding: 10px 5px; cursor: pointer; color: #6c757d; }
        .tab.active { border-bottom: 3px solid #ffc107; color: #000; font-weight: bold; }

        .btn { padding: 6px 12px; border: 1px solid #ced4da; border-radius: 4px; background: white; cursor: pointer; font-weight: bold; }
        .btn:hover { background: #f8f9fa; }
        .btn-primary { background: #ffc107; border-color: #ffc107; }
        .btn-primary:hover { background: #e0a800; }

        .section-container { margin-bottom: 30px; }
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .section-title { font-weight: bold; font-size: 18px; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 15px; }
        
        .measure { 
            border: 2px solid #dee2e6; border-radius: 8px; height: 80px; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 20px; font-weight: bold; background: #f8f9fa;
        }
        .add-measure {
            border: 2px dashed #ced4da; background: transparent; cursor: pointer; color: #6c757d;
        }
        .add-measure:hover { background: #f8f9fa; border-color: #adb5bd; color: #495057; }
    </style>
</head>
<body>

    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        function App() {
            // Estado de proyectos
            const [projects, setProjects] = useState([
                { id: 1, name: "Can't Get You Off My Mind", sections: [
                    { id: 101, name: "Intro", measures: ["G", "%", "Am", "%"] }
                ]}
            ]);
            const [activeProjectId, setActiveProjectId] = useState(1);
            const [newProjectName, setNewProjectName] = useState("");

            const activeProject = projects.find(p => p.id === activeProjectId);

            // Funciones de manejo de datos
            const handleAddProject = (e) => {
                e.preventDefault();
                if (!newProjectName.trim()) return;
                
                const newProject = {
                    id: Date.now(),
                    name: newProjectName,
                    sections: []
                };
                
                setProjects([...projects, newProject]);
                setActiveProjectId(newProject.id);
                setNewProjectName("");
            };

            const handleAddSection = () => {
                const sectionName = prompt("Nombre de la nueva sección (ej: Verso 1, Estribillo):");
                if (!sectionName) return;

                setProjects(projects.map(p => {
                    if (p.id === activeProjectId) {
                        return {
                            ...p,
                            sections: [...p.sections, { id: Date.now(), name: sectionName, measures: [] }]
                        };
                    }
                    return p;
                }));
            };

            const handleAddMeasure = (sectionId) => {
                const chord = prompt("Ingresa el acorde para este compás (ej: G, Am, %):");
                if (!chord) return;

                setProjects(projects.map(p => {
                    if (p.id === activeProjectId) {
                        return {
                            ...p,
                            sections: p.sections.map(s => {
                                if (s.id === sectionId) {
                                    return { ...s, measures: [...s.measures, chord] };
                                }
                                return s;
                            })
                        };
                    }
                    return p;
                }));
            };

            return (
                <div style={{ display: 'flex', width: '100%' }}>
                    {/* Barra Lateral */}
                    <div className="sidebar">
                        <div className="app-title">🎵 Priel Musical</div>
                        <h3>PROYECTOS</h3>
                        
                        <div className="project-list">
                            {projects.map(project => (
                                <div 
                                    key={project.id} 
                                    className={`project-item ${project.id === activeProjectId ? 'active' : ''}`}
                                    onClick={() => setActiveProjectId(project.id)}
                                >
                                    {project.name}
                                </div>
                            ))}
                        </div>

                        <form className="add-project-form" onSubmit={handleAddProject}>
                            <input 
                                type="text" 
                                className="input-text" 
                                placeholder="Nuevo proyecto..." 
                                value={newProjectName}
                                onChange={(e) => setNewProjectName(e.target.value)}
                            />
                            <button type="submit" className="btn btn-primary">+</button>
                        </form>
                    </div>

                    {/* Área Principal */}
                    <div className="main">
                        {activeProject ? (
                            <>
                                <h1>{activeProject.name}</h1>
                                
                                <div className="tabs">
                                    <div className="tab">Pizarra</div>
                                    <div className="tab active">Score</div>
                                    <div className="tab">Entrenamiento</div>
                                </div>

                                <div style={{ marginBottom: '20px' }}>
                                    <button className="btn" onClick={handleAddSection}>+ Agregar Sección</button>
                                </div>

                                {/* Renderizado de Secciones y Compases */}
                                {activeProject.sections.map(section => (
                                    <div key={section.id} className="section-container">
                                        <div className="section-header">
                                            <div className="section-title">{section.name}</div>
                                        </div>
                                        <div className="grid">
                                            {section.measures.map((measure, index) => (
                                                <div key={index} className="measure">{measure}</div>
                                            ))}
                                            <button 
                                                className="measure add-measure"
                                                onClick={() => handleAddMeasure(section.id)}
                                            >
                                                +
                                            </button>
                                        </div>
                                    </div>
                                ))}
                                
                                {activeProject.sections.length === 0 && (
                                    <p style={{ color: '#6c757d' }}>No hay secciones. Agrega una para empezar a componer.</p>
                                )}
                            </>
                        ) : (
                            <h2>Selecciona o crea un proyecto</h2>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
