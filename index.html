<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Priel Musical</title>
    <style>
        body { display: flex; height: 100vh; margin: 0; font-family: system-ui, sans-serif; }
        
        .sidebar { width: 250px; background: #f8f9fa; padding: 20px; border-right: 1px solid #e9ecef; display: flex; flex-direction: column; }
        .app-title { font-size: 18px; font-weight: bold; margin-bottom: 30px; display: flex; align-items: center; gap: 10px; color: #000; }
        .sidebar h3 { font-size: 14px; color: #6c757d; margin-top: 0; }
        
        .project-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .project-item { padding: 10px; background: #e9ecef; border-radius: 6px; cursor: pointer; color: #333; }
        .project-item.active { background: #ffc107; font-weight: bold; color: #000; }
        
        .add-project-form { margin-top: 20px; display: flex; gap: 5px; }
        .input-text { flex: 1; padding: 8px; border: 1px solid #ced4da; border-radius: 4px; }
        
        .main { flex: 1; padding: 30px; background: #ffffff; overflow-y: auto; }
        
        .tabs { display: flex; gap: 20px; border-bottom: 1px solid #dee2e6; margin-bottom: 20px; }
        .tab { padding: 10px 5px; cursor: pointer; color: #6c757d; }
        .tab.active { border-bottom: 3px solid #ffc107; color: #000; font-weight: bold; }

        .btn { padding: 6px 12px; border: 1px solid #ced4da; border-radius: 4px; background: white; cursor: pointer; font-weight: bold; }
        .btn:hover { background: #f8f9fa; }
        .btn-primary { background: #ffc107; border-color: #ffc107; }
        .btn-primary:hover { background: #e0a800; }

        .section-container { margin-bottom: 30px; }
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .section-title { font-weight: bold; font-size: 18px; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 15px; }
        
        .measure { 
            border: 2px solid #dee2e6; border-radius: 8px; height: 80px; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 20px; font-weight: bold; background: #f8f9fa;
        }
        .add-measure {
            border: 2px dashed #ced4da; background: transparent; cursor: pointer; color: #6c757d;
        }
        .add-measure:hover { background: #f8f9fa; border-color: #adb5bd; color: #495057; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="app-title">🎵 Priel Musical</div>
        <h3>PROYECTOS</h3>
        <div class="project-list" id="project-list"></div>
        
        <form class="add-project-form" id="add-project-form">
            <input type="text" id="new-project-input" class="input-text" placeholder="Nuevo proyecto...">
            <button type="submit" class="btn btn-primary">+</button>
        </form>
    </div>

    <div class="main">
        <h1 id="project-title"></h1>
        
        <div class="tabs">
            <div class="tab">Pizarra</div>
            <div class="tab active">Score</div>
            <div class="tab">Entrenamiento</div>
        </div>

        <div style="margin-bottom: 20px;">
            <button class="btn" id="btn-add-section">+ Agregar Sección</button>
        </div>

        <div id="sections-container"></div>
    </div>

    <script>
        // Estado inicial
        let projects = [
            { id: 1, name: "Can't Get You Off My Mind", sections: [
                { id: 101, name: "Intro", measures: ["G", "%", "Am", "%"] }
            ]}
        ];
        let activeProjectId = 1;

        // Referencias del DOM
        const projectListEl = document.getElementById('project-list');
        const projectTitleEl = document.getElementById('project-title');
        const sectionsContainerEl = document.getElementById('sections-container');
        const addProjectForm = document.getElementById('add-project-form');
        const newProjectInput = document.getElementById('new-project-input');
        const btnAddSection = document.getElementById('btn-add-section');

        // Función de renderizado
        function render() {
            // Renderizar lista de proyectos
            projectListEl.innerHTML = '';
            projects.forEach(project => {
                const div = document.createElement('div');
                div.className = `project-item ${project.id === activeProjectId ? 'active' : ''}`;
                div.textContent = project.name;
                div.onclick = () => { 
                    activeProjectId = project.id; 
                    render(); 
                };
                projectListEl.appendChild(div);
            });

            // Renderizar área principal
            const activeProject = projects.find(p => p.id === activeProjectId);
            if (activeProject) {
                projectTitleEl.textContent = activeProject.name;
                sectionsContainerEl.innerHTML = '';
                
                if (activeProject.sections.length === 0) {
                    sectionsContainerEl.innerHTML = '<p style="color: #6c757d">No hay secciones. Agrega una para empezar a componer.</p>';
                }

                activeProject.sections.forEach(section => {
                    const sectionDiv = document.createElement('div');
                    sectionDiv.className = 'section-container';
                    
                    let measuresHtml = section.measures.map(m => `<div class="measure">${m}</div>`).join('');
                    measuresHtml += `<button class="measure add-measure" onclick="addMeasure(${section.id})">+</button>`;

                    sectionDiv.innerHTML = `
                        <div class="section-header">
                            <div class="section-title">${section.name}</div>
                        </div>
                        <div class="grid">${measuresHtml}</div>
                    `;
                    sectionsContainerEl.appendChild(sectionDiv);
                });
            }
        }

        // Eventos
        addProjectForm.onsubmit = (e) => {
            e.preventDefault();
            const name = newProjectInput.value.trim();
            if (!name) return;
            
            const newProject = { id: Date.now(), name, sections: [] };
            projects.push(newProject);
            activeProjectId = newProject.id;
            newProjectInput.value = '';
            render();
        };

        btnAddSection.onclick = () => {
            const name = prompt("Nombre de la nueva sección (ej: Verso 1, Estribillo):");
            if (!name) return;
            
            const activeProject = projects.find(p => p.id === activeProjectId);
            activeProject.sections.push({ id: Date.now(), name, measures: [] });
            render();
        };

        window.addMeasure = (sectionId) => {
            const chord = prompt("Ingresa el acorde para este compás (ej: G, Am, %):");
            if (!chord) return;
            
            const activeProject = projects.find(p => p.id === activeProjectId);
            const section = activeProject.sections.find(s => s.id === sectionId);
            if (section) {
                section.measures.push(chord);
            }
            render();
        };

        // Renderizado inicial
        render();
    </script>
</body>
</html>
